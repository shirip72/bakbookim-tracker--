<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב הזמנות בקבוקים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;direction:rtl}
.app{max-width:860px;margin:0 auto;padding:1.5rem}
h1{font-size:20px;font-weight:600;margin-bottom:1.5rem;color:#111}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e5e5}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.stat-val.warn{color:#c47a00}
.stat-val.ok{color:#2d7a2d}
.stat-val.danger{color:#c0392b}
.login-box{background:#fff;border-radius:14px;border:1px solid #e5e5e5;padding:2.5rem;text-align:center;max-width:400px;margin:3rem auto}
.login-box h2{font-size:20px;margin-bottom:10px}
.login-box p{font-size:13px;color:#666;margin-bottom:1.5rem;line-height:1.6}
.gmail-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1px solid #ccc;border-radius:8px;padding:12px 20px;font-size:15px;cursor:pointer;font-family:Arial,sans-serif;color:#333;width:100%;transition:background .15s}
.gmail-btn:hover{background:#f0f0f0}
.tabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:1px solid #e5e5e5}
.tab{background:none;border:none;padding:8px 16px;font-size:14px;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:Arial}
.tab.active{color:#111;border-bottom:2px solid #111;font-weight:600}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filters input,.filters select{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;font-family:Arial}
.filters input{flex:1;min-width:140px}
.orders-list{display:flex;flex-direction:column;gap:8px}
.order-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden}
.order-card.overdue .order-header{border-right:3px solid #e74c3c}
.order-header{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.order-header:hover{background:#fafafa}
.order-card.arrived .order-header{opacity:0.55}
.order-info{flex:1;min-width:0}
.order-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-meta{font-size:12px;color:#888;margin-top:3px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge.ordered{background:#dbeafe;color:#1e40af}
.badge.partial{background:#fef3c7;color:#92400e}
.badge.arrived{background:#dcfce7;color:#166534}
.badge.problem{background:#fee2e2;color:#991b1b}
.btn-sm{background:#fff;border:1px solid #ddd;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:Arial}
.btn-sm:hover{background:#f5f5f5}
.btn-sm.danger{color:#c0392b;border-color:#fca5a5}
.order-body{display:none;border-top:1px solid #f0f0f0;padding:12px 16px;background:#fafafa}
.order-body.open{display:block}
.items-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.item-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:8px;border:1px solid #eee}
.item-row.item-arrived{background:#f0fdf4;border-color:#bbf7d0}
.item-check{width:18px;height:18px;cursor:pointer;accent-color:#2d7a2d;flex-shrink:0}
.item-name{flex:1;font-size:13px}
.item-name.checked{text-decoration:line-through;color:#aaa}
.item-qty{font-size:12px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:20px}
.order-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-item-row{display:flex;gap:8px;margin-top:8px}
.add-item-row input{flex:1;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ddd;font-family:Arial}
.add-item-row input.qty{width:60px;flex:none}
.progress-bar{height:4px;background:#e5e5e5;border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:#2d7a2d;border-radius:2px;transition:width .3s}
.alert{background:#fef3c7;border-radius:8px;padding:10px 14px;font-size:13px;color:#92400e;margin-bottom:1rem}
.sync-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sync-info{font-size:12px;color:#888}
.loading{text-align:center;padding:2rem;color:#888}
.empty{text-align:center;padding:2rem;color:#888;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#333;border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.chevron{font-size:12px;color:#aaa;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
</style>
</head>
<body>
<div class="app">

  <div id="screen-login" style="display:block">
    <div class="login-box">
      <div style="font-size:40px;margin-bottom:1rem">🍷</div>
      <h2>מעקב הזמנות בקבוקים</h2>
      <p>התחברי עם ג'ימייל שלך כדי לטעון את כל ההזמנות מ-bakbookim אוטומטית</p>
      <button class="gmail-btn" onclick="signIn()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        התחברי עם Google
      </button>
      <p style="font-size:11px;color:#aaa;margin-top:1rem">קוראת רק אימיילים מ-bakbookim. לא נשמר שום מידע בשרת.</p>
    </div>
  </div>

  <div id="screen-loading" style="display:none">
    <div class="loading">
      <span class="spinner"></span>
      <span id="loading-text" style="margin-right:8px">מחפשת אימיילים מ-bakbookim...</span>
    </div>
  </div>

  <div id="screen-main" style="display:none">
    <h1>🍷 מעקב הזמנות בקבוקים</h1>
    <div id="alert-bar"></div>
    <div class="stats">
      <div class="stat"><div class="stat-label">סה"כ הזמנות</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">ממתינות</div><div class="stat-val warn" id="s-pending">0</div></div>
      <div class="stat"><div class="stat-label">הגיעו במלואן</div><div class="stat-val ok" id="s-arrived">0</div></div>
      <div class="stat"><div class="stat-label">איחור 30+ יום</div><div class="stat-val danger" id="s-overdue">0</div></div>
    </div>
    <div class="sync-row">
      <div class="sync-info" id="sync-info"></div>
      <button class="btn-sm" onclick="syncGmail()">🔄 סנכרון מג'ימייל</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('all')">כל ההזמנות</button>
      <button class="tab" onclick="showTab('pending')">ממתינות</button>
      <button class="tab" onclick="showTab('overdue')">באיחור</button>
      <button class="tab" onclick="showTab('arrived')">הגיעו</button>
    </div>
    <div class="filters">
      <input type="text" id="search" placeholder="חיפוש..." oninput="renderOrders()">
    </div>
    <div class="orders-list" id="orders-list"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const CLIENT_ID = '550021318075-7h90uuu82qn64ot00kjjqms7eni71ckk.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly';
const STORE_KEY = 'bakbookim_orders_v3';
let tokenClient, accessToken;
let orders = [];
let currentTab = 'all';

function loadOrders(){ try{ orders=JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }catch(e){ orders=[]; } }
function saveOrders(){ localStorage.setItem(STORE_KEY, JSON.stringify(orders)); }
function daysSince(d){ if(!d) return 0; return Math.floor((Date.now()-new Date(d))/86400000); }
function show(id){ ['login','loading','main'].forEach(s=>{ document.getElementById('screen-'+s).style.display=s===id?'block':'none'; }); }

function parseItems(body){
  const items = [];
  // match "הבקבוקים שהזמנת :" or "הבקבוקים שהזמנת:"
  const match = body.match(/הבקבוקים שהזמנת\s*:?\s*([^\n<]+)/i);
  if(match){
    const raw = match[1].replace(/<br>/gi,'').trim();
    // split by comma or <br>
    const parts = raw.split(/,|<br>/i).map(s=>s.trim()).filter(Boolean);
    parts.forEach(part=>{
      // try to extract leading number as qty
      const qtyMatch = part.match(/^(\d+)\s+(.+)/);
      if(qtyMatch){
        items.push({ name: qtyMatch[2].trim(), qty: parseInt(qtyMatch[1]), arrived: false });
      } else if(part.length > 1) {
        items.push({ name: part, qty: 1, arrived: false });
      }
    });
  }
  return items;
}

function signIn(){
  if(!window.google){ setTimeout(signIn,500); return; }
  if(!tokenClient){
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp)=>{
        if(resp.error){ alert('שגיאה: '+resp.error); return; }
        accessToken = resp.access_token;
        show('loading');
        await syncGmail();
        show('main');
      }
    });
  }
  tokenClient.requestAccessToken();
}

async function syncGmail(){
  if(!accessToken) return;
  const queries = ['from:bakbookim', 'from:noreply@bakbookim.co.il'];
  let allMessages = [];
  for(const q of queries){
    try{
      const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${encodeURIComponent(q)}&maxResults=100`,{headers:{Authorization:'Bearer '+accessToken}});
      const d = await r.json();
      if(d.messages) allMessages.push(...d.messages);
    }catch(e){}
  }
  const unique = [...new Map(allMessages.map(m=>[m.id,m])).values()];
  let added = 0;
  for(const msg of unique.slice(0,80)){
    if(orders.find(o=>o.gmailId===msg.id)) continue;
    try{
      const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=full`,{headers:{Authorization:'Bearer '+accessToken}});
      const m = await r.json();
      const hdrs = m.payload.headers;
      const subject = (hdrs.find(h=>h.name==='Subject')||{}).value||'הזמנה';
      const dateStr = (hdrs.find(h=>h.name==='Date')||{}).value||'';
      const dateFormatted = dateStr ? new Date(dateStr).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];

      // get body
      let body = '';
      function extractBody(payload){
        if(payload.body && payload.body.data) body += atob(payload.body.data.replace(/-/g,'+').replace(/_/g,'/'));
        if(payload.parts) payload.parts.forEach(p=>extractBody(p));
      }
      extractBody(m.payload);

      const numMatch = subject.match(/(\d{4,6}-\d+)/) || body.match(/מספר\s+(\d{4,6}-\d+)/);
      const orderNum = numMatch ? numMatch[1] : '';
      const projectMatch = body.match(/פרוייקט\s+([^\s\n,<]+)/);
      const project = projectMatch ? projectMatch[1] : '';
      const pickupMatch = body.match(/כתובת[:\s]+([^\n<]+)/);
      const pickup = pickupMatch ? pickupMatch[1].trim() : '';

      const items = parseItems(body);

      orders.push({
        id: Date.now().toString()+Math.random().toString(36).slice(2),
        gmailId: msg.id,
        num: orderNum,
        name: project ? `פרויקט ${project}` : subject,
        date: dateFormatted,
        status: 'ordered',
        pickup,
        items,
        notes: ''
      });
      added++;
    }catch(e){ continue; }
  }
  saveOrders();
  const info = document.getElementById('sync-info');
  if(info) info.textContent = `סונכרן · ${added} חדשות · סה"כ ${orders.length}`;
  renderOrders();
}

function calcStatus(order){
  if(!order.items || order.items.length===0) return order.status||'ordered';
  const total = order.items.length;
  const done = order.items.filter(i=>i.arrived).length;
  if(done===0) return 'ordered';
  if(done===total) return 'arrived';
  return 'partial';
}

function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{ el.classList.toggle('active',['all','pending','overdue','arrived'][i]===t); });
  renderOrders();
}

function renderOrders(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let list=orders.filter(o=>{
    const st=calcStatus(o);
    if(currentTab==='pending') return st==='ordered'||st==='partial';
    if(currentTab==='overdue') return st!=='arrived'&&daysSince(o.date)>30;
    if(currentTab==='arrived') return st==='arrived';
    return true;
  }).filter(o=>{
    return !q||(o.name||'').toLowerCase().includes(q)||(o.num||'').includes(q);
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const statusLabel={ordered:'ממתין',partial:'הגיע חלקית',arrived:'הגיע ✓',problem:'בעיה'};
  const el=document.getElementById('orders-list');
  if(!list.length){ el.innerHTML='<div class="empty">אין הזמנות להצגה</div>'; updateStats(); return; }

  el.innerHTML=list.map(o=>{
    const st=calcStatus(o);
    const days=daysSince(o.date);
    const isOverdue=st!=='arrived'&&days>30;
    const items=o.items||[];
    const totalItems=items.length;
    const arrivedItems=items.filter(i=>i.arrived).length;
    const pct=totalItems>0?Math.round(arrivedItems/totalItems*100):0;

    const itemsHtml = items.map((item,idx)=>`
      <div class="item-row ${item.arrived?'item-arrived':''}" id="item-${o.id}-${idx}">
        <input type="checkbox" class="item-check" ${item.arrived?'checked':''} onchange="toggleItem('${o.id}',${idx},this.checked)">
        <span class="item-name ${item.arrived?'checked':''}">${item.name}</span>
        <span class="item-qty">×${item.qty}</span>
      </div>`).join('');

    return `<div class="order-card ${isOverdue?'overdue':''} ${st==='arrived'?'arrived':''}" id="card-${o.id}">
      <div class="order-header" onclick="toggleCard('${o.id}')">
        <div class="order-info">
          <div class="order-name">${o.name}${o.num?' — #'+o.num:''}</div>
          <div class="order-meta">${o.date}${o.pickup?' · '+o.pickup:''}${isOverdue?` · <span style="color:#c0392b;font-weight:600">${days} ימים!</span>`:''}</div>
          ${totalItems>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${totalItems>0?`<span style="font-size:12px;color:#888">${arrivedItems}/${totalItems}</span>`:''}
          <span class="badge ${st}">${statusLabel[st]||st}</span>
          <span class="chevron" id="chev-${o.id}">▼</span>
        </div>
      </div>
      <div class="order-body" id="body-${o.id}">
        ${totalItems>0?`<div class="items-list">${itemsHtml}</div>`:'<p style="font-size:13px;color:#aaa;margin-bottom:10px">לא זוהו פריטים — הוסיפי ידנית:</p>'}
        <div class="add-item-row">
          <input type="number" class="qty" placeholder="כמות" id="qty-${o.id}" value="1" min="1">
          <input type="text" placeholder="שם פריט..." id="newitem-${o.id}">
          <button class="btn-sm" onclick="addItem('${o.id}')">+ הוסף</button>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn-sm" onclick="markAllArrived('${o.id}')">✓ סמן הכל הגיע</button>
          <button class="btn-sm danger" onclick="deleteOrder('${o.id}')">🗑 מחק הזמנה</button>
        </div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function toggleCard(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleItem(orderId, idx, checked){
  const o=orders.find(x=>x.id===orderId);
  if(!o||!o.items) return;
  o.items[idx].arrived=checked;
  saveOrders();
  renderOrders();
  // reopen card
  setTimeout(()=>{
    const body=document.getElementById('body-'+orderId);
    const chev=document.getElementById('chev-'+orderId);
    if(body){ body.classList.add('open'); chev.classList.add('open'); }
  },10);
}

function addItem(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o) return;
  const name=document.getElementById('newitem-'+orderId).value.trim();
  const qty=parseInt(document.getElementById('qty-'+orderId).value)||1;
  if(!name) return;
  if(!o.items) o.items=[];
  o.items.push({name,qty,arrived:false});
  saveOrders();
  renderOrders();
  setTimeout(()=>{
    const body=document.getElementById('body-'+orderId);
    const chev=document.getElementById('chev-'+orderId);
    if(body){ body.classList.add('open'); chev.classList.add('open'); }
  },10);
}

function markAllArrived(orderId){
  const o=orders.find(x=>x.id===orderId);
  if(!o||!o.items) return;
  o.items.forEach(i=>i.arrived=true);
  saveOrders(); renderOrders();
}

function deleteOrder(id){
  if(!confirm('למחוק הזמנה זו?')) return;
  orders=orders.filter(x=>x.id!==id); saveOrders(); renderOrders();
}

function updateStats(){
  const total=orders.length;
  const pending=orders.filter(o=>{ const s=calcStatus(o); return s==='ordered'||s==='partial'; }).length;
  const arrived=orders.filter(o=>calcStatus(o)==='arrived').length;
  const overdue=orders.filter(o=>calcStatus(o)!=='arrived'&&daysSince(o.date)>30).length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-pending').textContent=pending;
  document.getElementById('s-arrived').textContent=arrived;
  document.getElementById('s-overdue').textContent=overdue;
  const bar=document.getElementById('alert-bar');
  bar.innerHTML=overdue>0?`<div class="alert">⚠️ ${overdue} הזמנות ממתינות מעל 30 יום!</div>`:'';
}

loadOrders();
if(orders.length>0){ show('main'); renderOrders(); }
</script>
</body>
</html>
